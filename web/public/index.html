<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="E-Commerce System for Datamak Technologies - Computers, ICT Products, and Web Hosting Services" />
    
    <title>E-Commerce Store | Datamak Technologies</title>
    
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛒</text></svg>" />
    
    <style>
        /* Global styles for initial loading screen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', 'Arial Narrow', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        /* Loading spinner */
        .loading-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            flex-direction: column;
            color: white;
        }
        
        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .loading-text {
            font-size: 18px;
            letter-spacing: 2px;
        }
        
        /* Error message styles */
        .error-message {
            background: rgba(255, 0, 0, 0.9);
            color: white;
            padding: 15px;
            border-radius: 8px;
            margin: 20px;
            text-align: center;
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: none;
        }
    </style>
</head>
<body>
    <div id="root">
        <!-- Initial loading state - will be replaced by React -->
        <div class="loading-container">
            <div class="spinner"></div>
            <div class="loading-text">Loading E-Commerce System...</div>
            <div style="margin-top: 20px; font-size: 14px; opacity: 0.8;">
                Datamak Technologies
            </div>
        </div>
    </div>
    
    <!-- Global error display -->
    <div id="global-error" class="error-message"></div>
    
    <script>
        // Global error handler
        window.addEventListener('error', function(e) {
            const errorDiv = document.getElementById('global-error');
            if (errorDiv) {
                errorDiv.style.display = 'block';
                errorDiv.innerHTML = '⚠️ Application Error: ' + e.message;
                setTimeout(() => {
                    errorDiv.style.display = 'none';
                }, 5000);
            }
        });
        
        // Check if backend is available on load
        fetch('http://localhost:5000/api/products')
            .then(response => response.json())
            .then(data => {
                console.log('✅ Backend connected! Products found:', data.products?.length || 0);
            })
            .catch(error => {
                console.warn('⚠️ Backend not reachable. Make sure backend is running on port 5000');
                const errorDiv = document.getElementById('global-error');
                if (errorDiv) {
                    errorDiv.style.display = 'block';
                    errorDiv.innerHTML = '⚠️ Backend not connected! Please start the backend server on port 5000.';
                }
            });
    </script>
</body>
</html>
