version: '3.8'
services:
  backend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: backend
    ports:
      - "5000:5000"
    restart: always
  frontend:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always